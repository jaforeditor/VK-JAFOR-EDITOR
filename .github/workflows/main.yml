name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Create dummy files and mock stfca for validation
      run: |
        echo '{}' > config.json
        echo '[]' > BADOL-Appstate.json
        mkdir -p BADOL-Main
        echo 'module.exports = function(api) {};' > BADOL-Main/badol.js
        echo 'module.exports = { error: function() {}, cmd: function() {}, autoBanner: function() {} };' > BADOL-Main/logger.js
        # stfca প্যাকেজটির এরর এড়াতে একটি ডামি মডিউল তৈরি করা হচ্ছে
        mkdir -p node_modules/stfca
        echo 'module.exports = function() {};' > node_modules/stfca/index.js

    - name: Install Dependencies
      run: npm install --legacy-peer-deps || npm install || true

    - name: Validate Syntax
      run: node --check index.js
